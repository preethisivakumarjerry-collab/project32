<!DOCTYPE html>
<html lang="en">
<head>
  <title>Input Groups</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    body {
      background: linear-gradient(135deg,#1d2b64,#f8cdda);
      padding: 40px;
      font-family: 'Segoe UI', sans-serif;
    }

    .box {
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      color: white;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
    }

    /* 🔥 Input style */
    .form-control {
      background: transparent;
      border: none;
      border-bottom: 2px solid #ccc;
      color: white;
      transition: 0.3s;
    }

    .form-control:focus {
      box-shadow: none;
      border-bottom: 2px solid #ffd369;
    }

    /* 🔥 Input group text */
    .input-group-text {
      background: transparent;
      border: none;
      color: #ffd369;
      font-size: 18px;
    }

    /* 🔥 Hover animation */
    .input-group {
      transition: 0.3s;
    }

    .input-group:hover {
      transform: scale(1.02);
    }

    /* 🔥 Button */
    .btn-custom {
      background: linear-gradient(45deg,#ff6a00,#ee0979);
      border: none;
      color: white;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px white;
    }

  </style>
</head>

<body>

<div class="box">

  <h2>Input Groups</h2>

  <!-- 1 Username -->
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
    </div>
    <input type="text" class="form-control" placeholder="Username">
  </div>

  <!-- 2 Email -->
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
    </div>
    <input type="email" class="form-control" placeholder="Email">
  </div>

  <!-- 3 Price -->
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">$</span>
    </div>
    <input type="text" class="form-control" placeholder="Price">
    <div class="input-group-append">
      <span class="input-group-text">USD</span>
    </div>
  </div>

  <!-- 4 Search -->
  <div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="Search...">
    <div class="input-group-append">
      <button class="btn btn-custom"><i class="bi bi-search"></i></button>
    </div>
  </div>

  <!-- 5 Checkbox -->
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <div class="input-group-text">
        <input type="checkbox">
      </div>
    </div>
    <input type="text" class="form-control" placeholder="With checkbox">
  </div>

  <!-- 6 Radio -->
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <div class="input-group-text">
        <input type="radio">
      </div>
    </div>
    <input type="text" class="form-control" placeholder="With radio">
  </div>

  <!-- 7 Large -->
  <div class="input-group input-group-lg mb-3">
    <input type="text" class="form-control" placeholder="Large input">
  </div>

  <!-- 8 Small -->
  <div class="input-group input-group-sm mb-3">
    <input type="text" class="form-control" placeholder="Small input">
  </div>

</div>

</body>
</html>
